  <style>
    /*
     * iOS PWA 高度修正策略（2026 版）：
     *
     * 問題1：iOS 26.1 破壞了 black-translucent，PWA 不再全螢幕
     * 問題2：viewport-fit=cover 導致 document 向上偏移 safe-area-inset-top，
     *        底部出現等高的空白條
     * 問題3：100dvh 在 iOS 冷啟動時值不準確
     *
     * 解法：
     * - html 用 min-height: calc(100% + env(safe-area-inset-top)) 填補底部偏移空白
     * - body/#root 用 JS 計算的 --app-height 取代 100dvh（最可靠）
     * - html background-color 覆蓋任何殘留空白
     */

    html {
      /* 填補 document 向上偏移後底部空白 (iOS PWA classic fix) */
      height: 100%;
      min-height: calc(100% + env(safe-area-inset-top));
      margin: 0;
      padding: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background-color: #FFFFFF;
    }

    body, #root {
      /* --app-height 由 JS 在執行時設定為 window.innerHeight，比 100dvh 更可靠 */
      height: var(--app-height, 100dvh);
      margin: 0;
      padding: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background-color: #FFFFFF;
    }

    #root {
      display: flex;
      flex-direction: column;
    }

    body {
      -webkit-tap-highlight-color: transparent;
      font-feature-settings: "ss01", "cv11";
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    *::-webkit-scrollbar {
      display: none !important;
    }

    /* iOS-style focus ring removal for buttons (we use active:scale instead) */
    button:focus {
      outline: none;
    }

    /* Hairline separator helper */
    .ios-hairline {
      box-shadow: inset 0 -0.5px 0 rgba(60, 60, 67, 0.12);
    }

    /* Safe area — defined here so env() is always resolved correctly on iOS PWA */
    .safe-area-pb {
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
  </style>

<body class="bg-mag-paper text-mag-black antialiased selection:bg-mag-gold selection:text-white">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>

  <!-- iOS PWA 高度修正：用 window.innerHeight 取代不穩定的 100dvh -->
  <!-- 同時解決冷啟動 timing race：iOS PWA 啟動時 viewport 尚未穩定，需多次重試 + localStorage 記憶上次正確高度 -->
  <script>
    (function () {
      var STORAGE_KEY = 'pwa-device-height';
      var MIN_SANE_HEIGHT = 500; // 小於此值視為尚未穩定，不採用

      function setAppHeight(h) {
        document.documentElement.style.setProperty('--app-height', h + 'px');
      }

      function measureAndSet() {
        var h = window.innerHeight;
        setAppHeight(h);
        // 高度合理才存入 localStorage，供下次冷啟動使用
        if (h >= MIN_SANE_HEIGHT) {
          try { localStorage.setItem(STORAGE_KEY, String(h)); } catch (e) {}
        }
        return h;
      }

      // 1. 先用 localStorage 記憶的高度立即填入，避免冷啟動白條閃爍
      try {
        var stored = parseInt(localStorage.getItem(STORAGE_KEY) || '0', 10);
        if (stored >= MIN_SANE_HEIGHT) {
          setAppHeight(stored);
        }
      } catch (e) {}

      // 2. 立即測量一次
      measureAndSet();

      // 3. 冷啟動多次重試：iOS PWA viewport 通常在 300–800ms 內穩定
      [50, 150, 300, 600, 1000].forEach(function (delay) {
        setTimeout(measureAndSet, delay);
      });

      // 4. resize 時更新（橫轉直等）
      window.addEventListener('resize', measureAndSet);

      // 5. orientationchange 後略等 Safari 穩定
      window.addEventListener('orientationchange', function () {
        setTimeout(measureAndSet, 150);
        setTimeout(measureAndSet, 500);
      });

      // 6. visualViewport API（iOS 13+ 更精確）
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', measureAndSet);
      }
    })();
  </script>
